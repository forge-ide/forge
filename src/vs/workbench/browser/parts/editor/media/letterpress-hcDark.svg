<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260" fill="none">
  <!-- Forge IDE letterpress: hammer + node graph (high contrast dark) -->
  <!-- Spokes from center to nodes -->
  <line x1="130" y1="130" x2="130" y2="26" stroke="#3C3C3C" stroke-width="5.2" stroke-linecap="round"/>
  <line x1="130" y1="130" x2="31.1" y2="97.8" stroke="#3C3C3C" stroke-width="5.2" stroke-linecap="round"/>
  <line x1="130" y1="130" x2="228.9" y2="97.8" stroke="#3C3C3C" stroke-width="5.2" stroke-linecap="round"/>
  <line x1="130" y1="130" x2="68.9" y2="214.1" stroke="#3C3C3C" stroke-width="5.2" stroke-linecap="round"/>
  <line x1="130" y1="130" x2="191.1" y2="214.1" stroke="#3C3C3C" stroke-width="5.2" stroke-linecap="round"/>
  <!-- Outer nodes -->
  <circle cx="130" cy="26" r="12" fill="none" stroke="#3C3C3C" stroke-width="4.4"/>
  <circle cx="31.1" cy="97.8" r="12" fill="none" stroke="#3C3C3C" stroke-width="4.4"/>
  <circle cx="228.9" cy="97.8" r="12" fill="none" stroke="#3C3C3C" stroke-width="4.4"/>
  <circle cx="68.9" cy="214.1" r="12" fill="none" stroke="#3C3C3C" stroke-width="4.4"/>
  <circle cx="191.1" cy="214.1" r="12" fill="none" stroke="#3C3C3C" stroke-width="4.4"/>
  <!-- Center hub -->
  <circle cx="130" cy="130" r="31.2" fill="none" stroke="#3C3C3C" stroke-width="3.1"/>
  <!-- Hammer handle -->
  <rect x="122.9" y="140" width="14.2" height="28.1" rx="3.5" fill="#3C3C3C" opacity="0.5"/>
  <!-- Hammer head -->
  <rect x="101.6" y="114.8" width="56.8" height="24.96" rx="4" fill="#3C3C3C" opacity="0.7"/>
  <!-- Top bevel -->
  <rect x="101.6" y="114.8" width="56.8" height="7" rx="3.4" fill="#3C3C3C" opacity="0.9"/>
  <!-- Ember strike stripe -->
  <rect x="101.6" y="133.8" width="56.8" height="6" rx="2.8" fill="#3C3C3C" opacity="0.6"/>
</svg>
