name: Forge CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  setup-cache:
    name: Setup Cache
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    permissions:
      contents: read

    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      npm_config_arch: x64
      VSCODE_ARCH: x64
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install system dependencies
        run: bash build/github/install-system-deps.sh ci

      - name: Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
            extensions/node_modules
            extensions/**/node_modules
            .vscode/extensions/**/node_modules
          key: node_modules-linux-x64-${{ hashFiles('package-lock.json', 'build/package-lock.json', 'extensions/**/package-lock.json', '.vscode/extensions/**/package-lock.json', '.npmrc', 'build/.npmrc', 'build/.cachesalt') }}
          restore-keys: node_modules-linux-x64-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          for i in {1..5}; do
            npm ci && break
            [ $i -eq 5 ] && exit 1
            echo "Retrying npm ci ($i)..."
          done

      - name: Install build dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: build
        run: |
          for i in {1..5}; do
            npm ci && break
            [ $i -eq 5 ] && exit 1
            echo "Retrying npm ci ($i)..."
          done

      - name: Install extensions dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          find extensions .vscode/extensions -name "package-lock.json" -not -path "*/node_modules/*" | while read lockfile; do
            dir=$(dirname "$lockfile")
            echo "Installing $dir"
            npm ci --prefix "$dir"
          done

  lint-and-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: setup-cache

    permissions:
      contents: read

    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      npm_config_arch: x64
      VSCODE_ARCH: x64
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install system dependencies
        run: bash build/github/install-system-deps.sh ci

      - name: Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
            extensions/node_modules
            extensions/**/node_modules
            .vscode/extensions/**/node_modules
          key: node_modules-linux-x64-${{ hashFiles('package-lock.json', 'build/package-lock.json', 'extensions/**/package-lock.json', '.vscode/extensions/**/package-lock.json', '.npmrc', 'build/.npmrc', 'build/.cachesalt') }}
          restore-keys: node_modules-linux-x64-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install build dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: build
        run: npm ci

      - name: Install extensions dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          find extensions .vscode/extensions -name "package-lock.json" -not -path "*/node_modules/*" | while read lockfile; do
            dir=$(dirname "$lockfile")
            echo "Installing $dir"
            npm ci --prefix "$dir"
          done

      - name: TypeScript compile
        run: npm run compile

      - name: ESLint
        run: npm run eslint

      - name: Stylelint
        run: npm run stylelint

      - name: Hygiene checks
        run: npm run hygiene

      - name: Layer validation
        run: npm run valid-layers-check

  unit-tests:
    name: Unit Tests (Node.js)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: setup-cache

    permissions:
      contents: read

    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      npm_config_arch: x64
      VSCODE_ARCH: x64
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install system dependencies
        run: bash build/github/install-system-deps.sh ci

      - name: Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
            extensions/node_modules
            extensions/**/node_modules
            .vscode/extensions/**/node_modules
          key: node_modules-linux-x64-${{ hashFiles('package-lock.json', 'build/package-lock.json', 'extensions/**/package-lock.json', '.vscode/extensions/**/package-lock.json', '.npmrc', 'build/.npmrc', 'build/.cachesalt') }}
          restore-keys: node_modules-linux-x64-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install build dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: build
        run: npm ci

      - name: Install extensions dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          find extensions .vscode/extensions -name "package-lock.json" -not -path "*/node_modules/*" | while read lockfile; do
            dir=$(dirname "$lockfile")
            echo "Installing $dir"
            npm ci --prefix "$dir"
          done

      - name: Compile
        run: npm run compile

      - name: Run node unit tests
        run: npm run test-node
        timeout-minutes: 15
