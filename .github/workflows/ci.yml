name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            pkg-config \
            build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Install web workspace deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web app (Tauri frontendDist)
        working-directory: web
        run: pnpm --filter app build

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all

      # Supply-chain hygiene (F-070).
      # cargo audit fails on any vulnerability advisory; unmaintained /
      # unsound transitive deps are suppressed via deny.toml with expiry
      # dates. See docs/dev/security.md for the suppression policy.
      - name: cargo audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          denyWarnings: false

      # cargo deny covers licenses, bans (multi-version warnings), advisory
      # ignores with expiry dates, and source allowlists. Config: deny.toml.
      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

      - name: Check TS bindings are up to date
        run: git diff --exit-code web/packages/ipc/src/generated/

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # Supply-chain hygiene (F-070).
      # Fail on any advisory at moderate or higher severity.
      - name: pnpm audit
        run: pnpm audit --audit-level moderate

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Check design token drift
        run: pnpm run check-tokens

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test
