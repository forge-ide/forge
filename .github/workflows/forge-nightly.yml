name: Forge Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_call:
    inputs:
      sha:
        required: true
        type: string

jobs:
  nightly-linux-x64:
    name: Nightly Build (Linux x64)
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    env:
      npm_config_arch: x64
      VSCODE_ARCH: x64
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install system dependencies
        run: bash build/github/install-system-deps.sh ci
      - name: Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
            extensions/node_modules
            extensions/**/node_modules
            .vscode/extensions/**/node_modules
          key: node_modules-linux-x64-${{ hashFiles('package-lock.json', 'build/package-lock.json', 'extensions/**/package-lock.json', '.vscode/extensions/**/package-lock.json', '.npmrc', 'build/.npmrc', 'build/.cachesalt') }}
          restore-keys: node_modules-linux-x64-
      - name: Install root dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          for i in {1..5}; do npm ci && break; [ $i -eq 5 ] && exit 1; echo "Retry $i..."; done
      - name: Install build dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: build
        run: |
          for i in {1..5}; do npm ci && break; [ $i -eq 5 ] && exit 1; echo "Retry $i..."; done
      - name: Install extensions dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          find extensions .vscode/extensions -name "package-lock.json" \
            -not -path "*/node_modules/*" -execdir pwd \; \
            | xargs -P 4 -I{} npm ci --prefix {}
      - name: Restore sysroot cache
        id: cache-sysroots
        uses: actions/cache@v4
        with:
          path: .build/sysroots
          key: sysroots-linux-x64-${{ hashFiles('.nvmrc') }}
          restore-keys: sysroots-linux-x64-
      - name: Setup sysroot
        run: bash build/github/setup-sysroot.sh x64
      - name: Restore builtin extensions cache
        id: cache-builtin-extensions
        uses: actions/cache@v4
        with:
          path: .build/builtInExtensions
          key: builtin-extensions-${{ hashFiles('product.json') }}
      - name: Download builtin extensions
        if: steps.cache-builtin-extensions.outputs.cache-hit != 'true'
        run: npm run download-builtin-extensions
      - name: Compile build scripts
        run: npm run compile-build
      - name: Compile extensions build
        run: npm run compile-extensions-build
      - name: Bundle and minify
        run: npm run gulp core-ci
      - name: Assemble Forge Linux x64
        run: npm run gulp vscode-linux-x64-min-ci
      - name: Create archive
        run: tar -czf .build/forge-linux-x64.tar.gz -C .. Forge-linux-x64
      - name: Set nightly tag
        id: tag
        run: |
          DATE=$(date -u +%Y-%m-%d)
          SHA=$(git rev-parse --short HEAD)
          echo "tag=nightly-${DATE}-${SHA}" >> $GITHUB_OUTPUT
      - name: Install ORAS
        run: |
          ORAS_VERSION=1.2.0
          curl -sSLo oras.tar.gz "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar -xzf oras.tar.gz oras
          chmod +x oras
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | ./oras login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push nightly artifact to GHCR
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          REPO="ghcr.io/${{ github.repository_owner }}/forge-nightly"
          cd .build
          ../oras push "${REPO}:${TAG}" forge-linux-x64.tar.gz:application/vnd.forge.binary.tar+gzip
          ../oras tag "${REPO}:${TAG}" latest
      - name: Delete nightly packages older than 7 days
        run: |
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/orgs/forge-ide/packages/container/forge-nightly/versions" \
            --paginate \
            --jq ".[] | select(.created_at < \"${CUTOFF}\") | .id" \
          | xargs -I{} gh api --method DELETE \
            "/orgs/forge-ide/packages/container/forge-nightly/versions/{}" \
            2>/dev/null || true
