name: Forge Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (comma-separated: linux,windows,darwin)'
        required: false
        default: 'linux,windows,darwin'
  workflow_call:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux-x64:
    name: Build (Linux x64)
    if: ${{ github.event_name != 'workflow_dispatch' || contains(github.event.inputs.platforms, 'linux') }}
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      npm_config_arch: x64
      VSCODE_ARCH: x64
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install system dependencies
        run: bash build/github/install-system-deps.sh ci

      - name: Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
            extensions/node_modules
            extensions/**/node_modules
            .vscode/extensions/**/node_modules
          key: node_modules-linux-x64-${{ hashFiles('package-lock.json', 'build/package-lock.json', 'extensions/**/package-lock.json', '.vscode/extensions/**/package-lock.json', '.npmrc', 'build/.npmrc', 'build/.cachesalt') }}
          restore-keys: node_modules-linux-x64-

      - name: Install root dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          for i in 1 2 3 4 5; do
            npm ci && break || sleep 15
          done

      - name: Install build/ dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          cd build
          for i in 1 2 3 4 5; do
            npm ci && break || sleep 15
          done

      - name: Install extensions/ dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          find extensions .vscode/extensions -name "package-lock.json" -not -path "*/node_modules/*" -execdir pwd \; | xargs -P 4 -I{} npm ci --prefix {}

      - name: Restore sysroot cache
        id: cache-sysroots
        uses: actions/cache@v4
        with:
          path: .build/sysroots
          key: sysroots-linux-x64-${{ hashFiles('.nvmrc') }}
          restore-keys: sysroots-linux-x64-

      - name: Setup sysroot
        run: bash build/github/setup-sysroot.sh x64

      - name: Restore builtin extensions cache
        id: cache-builtin-extensions
        uses: actions/cache@v4
        with:
          path: .build/builtInExtensions
          key: builtin-extensions-${{ hashFiles('product.json') }}

      - name: Download builtin extensions
        if: steps.cache-builtin-extensions.outputs.cache-hit != 'true'
        run: npm run download-builtin-extensions

      - name: Compile build
        run: npm run compile-build

      - name: Compile extensions build
        run: npm run compile-extensions-build

      - name: Bundle and minify (esbuild)
        run: npm run gulp core-ci

      - name: Assemble Forge Linux x64
        run: npm run gulp vscode-linux-x64-min-ci

      - name: Create archive
        run: tar -czf .build/forge-linux-x64.tar.gz -C .. Forge-linux-x64

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-linux-x64
          path: .build/forge-linux-x64.tar.gz
          retention-days: 7

  package-linux-x64:
    name: Package (Linux x64)
    if: ${{ github.event_name != 'workflow_dispatch' || contains(github.event.inputs.platforms, 'linux') }}
    runs-on: ubuntu-22.04
    needs: build-linux-x64
    timeout-minutes: 45
    env:
      npm_config_arch: x64
      VSCODE_ARCH: x64
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install system dependencies (package mode)
        run: bash build/github/install-system-deps.sh package

      - name: Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
            extensions/node_modules
            extensions/**/node_modules
            .vscode/extensions/**/node_modules
          key: node_modules-linux-x64-${{ hashFiles('package-lock.json', 'build/package-lock.json', 'extensions/**/package-lock.json', '.vscode/extensions/**/package-lock.json', '.npmrc', 'build/.npmrc', 'build/.cachesalt') }}
          restore-keys: node_modules-linux-x64-

      - name: Install root dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          for i in 1 2 3 4 5; do
            npm ci && break || sleep 15
          done

      - name: Install build/ dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          cd build
          for i in 1 2 3 4 5; do
            npm ci && break || sleep 15
          done

      - name: Install extensions/ dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          find extensions .vscode/extensions -name "package-lock.json" -not -path "*/node_modules/*" -execdir pwd \; | xargs -P 4 -I{} npm ci --prefix {}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: forge-linux-x64
          path: .build/

      - name: Extract build artifact
        run: tar -xzf .build/forge-linux-x64.tar.gz -C ..

      - name: Setup sysroot (for STRIP binary path)
        run: bash build/github/setup-sysroot.sh x64

      - name: Build deb package
        run: |
          npm run gulp vscode-linux-x64-prepare-deb
          npm run gulp vscode-linux-x64-build-deb

      - name: Build rpm package
        run: |
          npm run gulp vscode-linux-x64-prepare-rpm
          npm run gulp vscode-linux-x64-build-rpm

      - name: Build snap package
        env:
          SNAPCRAFT_BUILD_ENVIRONMENT: host
        run: |
          npm run gulp vscode-linux-x64-prepare-snap
          npm run gulp vscode-linux-x64-build-snap

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-linux-x64-deb
          path: .build/linux/deb/**/*.deb
          retention-days: 7

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-linux-x64-rpm
          path: .build/linux/rpm/**/*.rpm
          retention-days: 7

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-linux-x64-snap
          path: .build/linux/snap/**/*.snap
          retention-days: 7

  build-linux-arm64:
    name: Build and Package (Linux arm64)
    if: ${{ github.event_name != 'workflow_dispatch' || contains(github.event.inputs.platforms, 'linux') }}
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 120
    env:
      npm_config_arch: arm64
      VSCODE_ARCH: arm64
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install system dependencies (package mode)
        run: bash build/github/install-system-deps.sh package

      - name: Restore node_modules cache
        id: cache-node-modules-arm64
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
            extensions/node_modules
            extensions/**/node_modules
            .vscode/extensions/**/node_modules
          key: node_modules-linux-arm64-${{ hashFiles('package-lock.json', 'build/package-lock.json', 'extensions/**/package-lock.json', '.vscode/extensions/**/package-lock.json', '.npmrc', 'build/.npmrc', 'build/.cachesalt') }}
          restore-keys: node_modules-linux-arm64-

      - name: Install root dependencies
        if: steps.cache-node-modules-arm64.outputs.cache-hit != 'true'
        run: |
          for i in 1 2 3 4 5; do
            npm ci && break || sleep 15
          done

      - name: Install build/ dependencies
        if: steps.cache-node-modules-arm64.outputs.cache-hit != 'true'
        run: |
          cd build
          for i in 1 2 3 4 5; do
            npm ci && break || sleep 15
          done

      - name: Install extensions/ dependencies
        if: steps.cache-node-modules-arm64.outputs.cache-hit != 'true'
        run: |
          find extensions .vscode/extensions -name "package-lock.json" -not -path "*/node_modules/*" -execdir pwd \; | xargs -P 4 -I{} npm ci --prefix {}

      - name: Restore builtin extensions cache
        id: cache-builtin-extensions-arm64
        uses: actions/cache@v4
        with:
          path: .build/builtInExtensions
          key: builtin-extensions-${{ hashFiles('product.json') }}

      - name: Download builtin extensions
        if: steps.cache-builtin-extensions-arm64.outputs.cache-hit != 'true'
        run: npm run download-builtin-extensions

      - name: Compile build
        run: npm run compile-build

      - name: Compile extensions build
        run: npm run compile-extensions-build

      - name: Bundle and minify (esbuild)
        run: npm run gulp core-ci

      - name: Assemble Forge Linux arm64
        run: npm run gulp vscode-linux-arm64-min-ci

      - name: Build deb package
        run: |
          npm run gulp vscode-linux-arm64-prepare-deb
          npm run gulp vscode-linux-arm64-build-deb

      - name: Build rpm package
        run: |
          npm run gulp vscode-linux-arm64-prepare-rpm
          npm run gulp vscode-linux-arm64-build-rpm

      - name: Create archive
        run: tar -czf .build/forge-linux-arm64.tar.gz -C .. Forge-linux-arm64

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-linux-arm64-deb
          path: .build/linux/deb/**/*.deb
          retention-days: 7

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-linux-arm64-rpm
          path: .build/linux/rpm/**/*.rpm
          retention-days: 7

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-linux-arm64
          path: .build/forge-linux-arm64.tar.gz
          retention-days: 7

  typecheck-macos:
    name: Typecheck (macOS)
    if: ${{ github.event_name != 'workflow_dispatch' || contains(github.event.inputs.platforms, 'darwin') }}
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install root dependencies
        run: npm ci

      - name: Install build/ dependencies
        run: cd build && npm ci

      - name: Typecheck
        run: npm run compile-check-ts-native

  typecheck-windows:
    name: Typecheck (Windows)
    if: ${{ github.event_name != 'workflow_dispatch' || contains(github.event.inputs.platforms, 'windows') }}
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install root dependencies
        run: npm ci

      - name: Install build/ dependencies
        run: cd build && npm ci

      - name: Typecheck
        run: npm run compile-check-ts-native
