  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - package-linux-x64-deb
      - package-linux-x64-rpm
      - package-linux-x64-snap
      - package-linux-arm64-deb
      - package-linux-arm64-rpm
      - package-linux-arm64-snap
    permissions:
      contents: write
      actions: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: forge-linux-*-(deb|rpm|snap)
          path: dist/
          merge-multiple: true
      - name: Extract changelog entry for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[?${VERSION}/ { found=1; next } found && /^## / { exit } found { print }" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog entry found for ${VERSION}" > release-notes.md
          fi
      - name: Create GitHub Release
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Forge IDE ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            dist/*
