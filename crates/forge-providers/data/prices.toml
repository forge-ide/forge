# forge-providers price table — F-593.
#
# One section per (provider, model). Rates are in **USD per million tokens**
# (matching every published price page); the cost-calc layer divides by
# 1_000_000 internally so callers can pass raw token counts.
#
# Manual updates only. Do not generate or auto-fetch this file — adding a row
# is a deliberate act tied to a provider release. A model whose price is not
# present surfaces as `cost: null` in `UsageSummary` rather than crashing the
# query.
#
# Schema (per row):
#   prompt_per_million_tokens     = USD/MTok charged on input tokens
#   completion_per_million_tokens = USD/MTok charged on output tokens
#   currency                      = ISO-4217 code; everything is "USD" today
#   last_updated                  = YYYY-MM-DD when this row was last reviewed

# ── Ollama (local; zero-cost) ──────────────────────────────────────────────
# Local-first provider. Every model is free at point of use. Listing one
# wildcard-shaped row is intentional: the lookup key is `provider + model`,
# so an Ollama user running an unrecognised model still surfaces as
# `cost: null` (the right outcome — we should not silently invent a price).

[[entry]]
provider = "ollama"
model = "*"
prompt_per_million_tokens = 0.0
completion_per_million_tokens = 0.0
currency = "USD"
last_updated = "2026-04-26"

