[package]
name = "forge-session"
version = "0.1.0"
edition = "2021"

[lib]
name = "forge_session"
path = "src/lib.rs"

[[bin]]
name = "forged"
path = "src/main.rs"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
forge-core = { path = "../forge-core" }
forge-ipc = { path = "../forge-ipc" }
forge-providers = { path = "../forge-providers" }
futures = "0.3"
serde_json = "1"
tokio = { version = "1", features = ["net", "io-util", "fs", "rt-multi-thread", "macros", "sync"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["rt", "macros", "time", "net"] }
