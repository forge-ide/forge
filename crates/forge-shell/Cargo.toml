[package]
name = "forge-shell"
version = "0.1.0"
edition = "2021"

[lib]
name = "forge_shell"
path = "src/lib.rs"

[[bin]]
name = "forge-shell"
path = "src/main.rs"
required-features = ["webview"]

[build-dependencies]
png = { version = "0.17", optional = true }
tauri-build = { version = "2", features = [], optional = true }

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
forge-providers = { path = "../forge-providers" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", optional = true }
tokio = { version = "1", features = ["sync", "time", "rt", "macros"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "time"] }
wiremock = "0.6"

[features]
# `webview` pulls the full Tauri 2 runtime (wry + webkit2gtk on Linux).
# Enabled by default so `cargo build` and CI produce a runnable binary.
# Disable with `--no-default-features` to run pure-Rust unit tests on a
# host without WebKitGTK installed.
default = ["webview"]
webview = ["dep:tauri", "dep:tauri-build", "dep:png"]
