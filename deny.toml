# cargo-deny configuration for forge
# https://embarkstudios.github.io/cargo-deny/
#
# Philosophy: warn, don't block, during Phase 1. Tighten as the codebase
# matures. This file is consulted by `cargo deny check` in CI and the
# milestone security audit workflow.

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]
all-features = false

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"

# Suppression policy: only `unmaintained` or `unsound` advisories for
# transitive deps we cannot upgrade from this repo (all reach us through
# Tauri 2's webkit2gtk chain or its proc-macro toolchain). Every entry
# carries an `expires` date ~6 months out so the suppression cannot
# silently outlive its justification — when the date hits, CI re-flags
# the advisory and we reassess. See docs/dev/security.md for policy.
ignore = [
    # gtk-rs GTK3 family (archived upstream; Tauri 2 still pulls them via
    # webkit2gtk-webview). Track tauri releases for gtk4 migration.
    { id = "RUSTSEC-2024-0411", reason = "gdkwayland-sys: gtk-rs GTK3 bindings unmaintained; transitive via Tauri 2 webkit2gtk-webview [expires 2026-10-19]" },
    { id = "RUSTSEC-2024-0412", reason = "gdk: gtk-rs GTK3 bindings unmaintained; transitive via Tauri 2 webkit2gtk-webview [expires 2026-10-19]" },
    { id = "RUSTSEC-2024-0413", reason = "atk: gtk-rs GTK3 bindings unmaintained; transitive via Tauri 2 webkit2gtk-webview [expires 2026-10-19]" },
    { id = "RUSTSEC-2024-0414", reason = "gdkx11-sys: gtk-rs GTK3 bindings unmaintained; transitive via Tauri 2 webkit2gtk-webview [expires 2026-10-19]" },
    { id = "RUSTSEC-2024-0415", reason = "gtk: gtk-rs GTK3 bindings unmaintained; transitive via Tauri 2 webkit2gtk-webview [expires 2026-10-19]" },
    { id = "RUSTSEC-2024-0416", reason = "atk-sys: gtk-rs GTK3 bindings unmaintained; transitive via Tauri 2 webkit2gtk-webview [expires 2026-10-19]" },
    { id = "RUSTSEC-2024-0417", reason = "gdkx11: gtk-rs GTK3 bindings unmaintained; transitive via Tauri 2 webkit2gtk-webview [expires 2026-10-19]" },
    { id = "RUSTSEC-2024-0418", reason = "gdk-sys: gtk-rs GTK3 bindings unmaintained; transitive via Tauri 2 webkit2gtk-webview [expires 2026-10-19]" },
    { id = "RUSTSEC-2024-0419", reason = "gtk3-macros: gtk-rs GTK3 bindings unmaintained; transitive via Tauri 2 webkit2gtk-webview [expires 2026-10-19]" },
    { id = "RUSTSEC-2024-0420", reason = "gtk-sys: gtk-rs GTK3 bindings unmaintained; transitive via Tauri 2 webkit2gtk-webview [expires 2026-10-19]" },

    # unic-* family (open-i18n/rust-unic archived). Reaches us through
    # Tauri macro tooling; no direct use in Forge code.
    { id = "RUSTSEC-2025-0075", reason = "unic-char-range unmaintained; transitive via Tauri macro toolchain [expires 2026-10-19]" },
    { id = "RUSTSEC-2025-0080", reason = "unic-common unmaintained; transitive via Tauri macro toolchain [expires 2026-10-19]" },
    { id = "RUSTSEC-2025-0081", reason = "unic-char-property unmaintained; transitive via Tauri macro toolchain [expires 2026-10-19]" },
    { id = "RUSTSEC-2025-0098", reason = "unic-ucd-version unmaintained; transitive via Tauri macro toolchain [expires 2026-10-19]" },
    { id = "RUSTSEC-2025-0100", reason = "unic-ucd-ident unmaintained; transitive via Tauri macro toolchain [expires 2026-10-19]" },

    # Miscellaneous unmaintained transitive deps.
    { id = "RUSTSEC-2025-0057", reason = "fxhash unmaintained; transitive (no direct use in Forge) [expires 2026-10-19]" },
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error unmaintained; transitive build-time via gtk3-macros [expires 2026-10-19]" },

    # Unsound advisories (present in the dep tree but not exercised by
    # Forge code — see S3 rationale in the F-070 PR body).
    { id = "RUSTSEC-2024-0429", reason = "glib VariantStrIter unsoundness; transitive via Tauri 2 webkit chain, not reachable from Forge code paths [expires 2026-10-19]" },
    { id = "RUSTSEC-2026-0097", reason = "rand thread_rng unsound when combined with a custom log::Logger calling rand::rng(); Forge does not install such a logger [expires 2026-10-19]" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "Zlib",
    "OpenSSL",
]
confidence-threshold = 0.8
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
